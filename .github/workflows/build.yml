name: build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-lsp:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build LSP
        run: cargo build -p korlang-lsp --release --target ${{ matrix.target }}
      - name: Upload LSP
        uses: actions/upload-artifact@v4
        with:
          name: korlang-lsp-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/korlang-lsp*

  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm -C packages/vscode-extension build
      - run: pnpm -C packages/vscode-extension package
      - uses: actions/upload-artifact@v4
        with:
          name: korlang-vscode
          path: packages/vscode-extension/dist/*.vsix

  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm -C packages/electron-ide build
      - run: pnpm -C packages/electron-ide package
      - uses: actions/upload-artifact@v4
        with:
          name: korlang-electron-${{ matrix.os }}
          path: packages/electron-ide/dist/**/*

  release:
    needs: [build-lsp, build-vscode, build-electron]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
